<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>スプレッドシート検索・編集</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  :root{--bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3350;--accent:#4f8ef7;--success:#34c784;--warn:#f59e3a;--gemini:#4285f4;--text:#e8eaf0;--text2:#8b90a8;--text3:#555b78;--radius:14px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:40px;}
  .header{background:linear-gradient(135deg,#1a1d27,#12152a);border-bottom:1px solid var(--border);padding:20px;position:sticky;top:0;z-index:100;}
  .header-title{font-size:17px;font-weight:700;display:flex;align-items:center;gap:8px;}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);}
  .main{padding:20px;max-width:520px;margin:0 auto;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden;}
  .search-area{padding:16px;}
  .label{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;}
  .input-wrap{position:relative;}
  input[type="text"]{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:15px;padding:12px 40px 12px 14px;outline:none;transition:border-color .2s;}
  input[type="text"]:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,142,247,.12);}
  input::placeholder{color:var(--text3);font-size:13px;}
  .clear-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:4px;line-height:1;display:none;}
  .clear-btn.show{display:block;}
  .btn-group{display:flex;gap:6px;margin-top:10px;}
  .btn{border:none;border-radius:10px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-weight:700;font-size:13px;padding:11px 10px;transition:all .2s;white-space:nowrap;flex:1;display:flex;align-items:center;justify-content:center;gap:5px;}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-primary:active{transform:scale(.97);}
  .btn-primary:disabled{background:var(--surface2);color:var(--text3);cursor:not-allowed;transform:none;}
  .btn-qr{background:var(--surface2);border:1px solid var(--border);color:var(--text);}
  .btn-qr.scanning{background:rgba(245,158,58,.15);border-color:var(--warn);color:var(--warn);}
  .qr-wrap{display:none;margin-top:14px;border-radius:12px;overflow:hidden;position:relative;}
  .qr-wrap.open{display:block;}
  #qr-reader{width:100%!important;border:none!important;background:#000;}
  #qr-reader__dashboard,#qr-reader__header_message{display:none!important;}
  .qr-close-btn{position:absolute;top:10px;right:10px;z-index:20;background:rgba(0,0,0,.65);border:none;color:#fff;border-radius:50%;width:34px;height:34px;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .qr-hint{text-align:center;font-size:12px;color:var(--text3);padding:8px;background:var(--surface2);}
  .status{border-radius:10px;font-size:13px;padding:10px 14px;margin-bottom:14px;display:none;align-items:center;}
  .status.show{display:flex;justify-content:space-between;}
  .status.loading{background:rgba(79,142,247,.1);border:1px solid rgba(79,142,247,.3);color:var(--accent);}
  .status.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#f87171;}
  .status.ok{background:rgba(52,199,132,.1);border:1px solid rgba(52,199,132,.3);color:var(--success);}
  .status.ocr{background:rgba(66,133,244,.1);border:1px solid rgba(66,133,244,.3);color:var(--gemini);}
  .status-msg{display:flex;align-items:center;gap:8px;flex:1;}
  .reset-btn{background:rgba(255,255,255,.1);border:none;border-radius:6px;color:inherit;font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:700;padding:4px 10px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
  .spin{display:inline-block;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .result-header{background:linear-gradient(135deg,rgba(79,142,247,.15),rgba(124,92,191,.1));border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;}
  .row-badge{background:var(--accent);color:#fff;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;flex-shrink:0;}
  .result-key{font-size:13px;color:var(--text2);font-family:'JetBrains Mono',monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
  .result-reset{background:rgba(255,255,255,.08);border:none;border-radius:6px;color:var(--text3);font-family:'Noto Sans JP',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;flex-shrink:0;}
  .fields{padding:16px;display:flex;flex-direction:column;gap:14px;}
  .field-label{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
  .col-tag{background:var(--surface2);border:1px solid var(--border);border-radius:5px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);padding:1px 6px;}
  .field-row{display:flex;gap:8px;align-items:stretch;}
  .field-row input{flex:1;padding-right:14px!important;}
  .btn-cam{background:rgba(66,133,244,.15);border:1px solid rgba(66,133,244,.4);border-radius:10px;color:var(--gemini);font-size:18px;width:46px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
  .btn-cam:active{background:rgba(66,133,244,.3);}
  .btn-cam.done{background:rgba(52,199,132,.2);border-color:rgba(52,199,132,.5);color:var(--success);}
  .save-area{padding:0 16px 16px;}
  .btn-success{background:var(--success);color:#0a1a10;width:100%;padding:14px;font-size:15px;border:none;border-radius:10px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-weight:700;transition:all .2s;}
  .btn-success:disabled{background:var(--surface2);color:var(--text3);cursor:not-allowed;}

  /* ── テキスト選択モーダル ── */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:none;flex-direction:column;}
  .modal-overlay.open{display:flex;}
  .modal-camera{position:relative;flex:1;overflow:hidden;background:#000;}
  .modal-camera video{width:100%;height:100%;object-fit:cover;display:block;}
  .modal-camera canvas{display:none;}
  .shutter-bar{position:absolute;bottom:0;left:0;right:0;padding:16px;display:flex;justify-content:center;align-items:center;gap:16px;background:linear-gradient(transparent,rgba(0,0,0,.7));}
  .shutter-btn{width:66px;height:66px;border-radius:50%;background:#fff;border:4px solid rgba(255,255,255,.5);cursor:pointer;transition:transform .1s;}
  .shutter-btn:active{transform:scale(.9);}
  .modal-close-cam{position:absolute;top:14px;left:14px;background:rgba(0,0,0,.6);border:none;color:#fff;border-radius:50%;width:36px;height:36px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .modal-analyzing{position:absolute;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
  .modal-analyzing.show{display:flex;}
  .modal-analyzing p{color:#fff;font-size:14px;font-weight:700;}

  .modal-result{display:none;flex-direction:column;background:var(--surface);max-height:60vh;}
  .modal-result.show{display:flex;}
  .modal-result-header{padding:14px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .modal-result-title{font-size:13px;font-weight:700;color:var(--text2);}
  .modal-result-close{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;}
  .modal-preview{width:100%;max-height:160px;object-fit:cover;display:block;}
  .text-chips{padding:12px 16px;display:flex;flex-wrap:wrap;gap:8px;overflow-y:auto;flex:1;}
  .text-chip{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:8px 14px;font-size:14px;cursor:pointer;transition:all .2s;font-family:'JetBrains Mono',monospace;}
  .text-chip:active{background:var(--accent);border-color:var(--accent);color:#fff;transform:scale(.97);}
  .retake-btn{margin:0 16px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text2);font-family:'Noto Sans JP',sans-serif;font-weight:700;font-size:13px;padding:11px;cursor:pointer;}
</style>
</head>
<body>
<div class="header">
  <div class="header-title"><div class="dot"></div>スプレッドシート検索・編集</div>
</div>
<div class="main">
  <div class="card">
    <div class="search-area">
      <div class="label">🔍 A列で検索（完全一致）</div>
      <div class="input-wrap">
        <input type="text" id="searchInput" placeholder="キーワードを手入力"
          oninput="onInput()" onkeydown="if(event.key==='Enter')doSearch()" />
        <button class="clear-btn" id="clearBtn" onclick="resetAll()">✕</button>
      </div>
      <div class="btn-group">
        <button class="btn btn-qr" id="qrBtn" onclick="toggleQR()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h2v2h-2zM18 14h3M14 18h2M18 18h3v3M21 14v2"/></svg>
          QR読込
        </button>
        <button class="btn btn-primary" onclick="doSearch()" id="searchBtn">検索</button>
      </div>
      <div class="qr-wrap" id="qrWrap">
        <div id="qr-reader"></div>
        <button class="qr-close-btn" onclick="stopQR()">✕</button>
        <div class="qr-hint">📷 QRコードをカメラに近づけてください</div>
      </div>
    </div>
  </div>

  <div class="status" id="status">
    <span class="status-msg" id="statusMsg"></span>
    <button class="reset-btn" id="resetBtn" onclick="resetAll()" style="display:none">🔄 リセット</button>
  </div>

  <div class="card" id="resultCard" style="display:none">
    <div class="result-header">
      <span class="row-badge" id="rowBadge">ROW —</span>
      <span class="result-key" id="resultKey"></span>
      <button class="result-reset" onclick="resetAll()">🔄 リセット</button>
    </div>
    <div class="fields">
      <div>
        <div class="field-label"><span class="col-tag">D</span>D列</div>
        <div class="field-row">
          <input type="text" id="fieldD" placeholder="（空）" />
          <button class="btn-cam" id="camD" onclick="openLens('D')" title="カメラで読取">📷</button>
        </div>
      </div>
      <div>
        <div class="field-label"><span class="col-tag">E</span>E列</div>
        <div class="field-row">
          <input type="text" id="fieldE" placeholder="（空）" />
          <button class="btn-cam" id="camE" onclick="openLens('E')" title="カメラで読取">📷</button>
        </div>
      </div>
      <div>
        <div class="field-label"><span class="col-tag">F</span>F列</div>
        <div class="field-row">
          <input type="text" id="fieldF" placeholder="（空）" />
          <button class="btn-cam" id="camF" onclick="openLens('F')" title="カメラで読取">📷</button>
        </div>
      </div>
      <div>
        <div class="field-label"><span class="col-tag">G</span>G列</div>
        <div class="field-row">
          <input type="text" id="fieldG" placeholder="（空）" />
          <button class="btn-cam" id="camG" onclick="openLens('G')" title="カメラで読取">📷</button>
        </div>
      </div>
    </div>
    <div class="save-area">
      <button class="btn-success" onclick="saveData()" id="saveBtn">💾 シートに保存</button>
    </div>
  </div>
</div>

<!-- テキスト選択モーダル -->
<div class="modal-overlay" id="lensModal">
  <!-- カメラビュー -->
  <div class="modal-camera" id="lensCamera">
    <video id="lensVideo" playsinline autoplay muted></video>
    <canvas id="lensCanvas"></canvas>
    <div class="modal-analyzing" id="lensAnalyzing">
      <div class="spin" style="font-size:36px">⟳</div>
      <p>Geminiがテキストを認識中...</p>
    </div>
    <button class="modal-close-cam" onclick="closeLens()">✕</button>
    <div class="shutter-bar">
      <button class="shutter-btn" onclick="captureFrame()" id="shutterBtn"></button>
    </div>
  </div>
  <!-- テキスト選択ビュー -->
  <div class="modal-result" id="lensResult">
    <img id="lensPreview" class="modal-preview" />
    <div class="modal-result-header">
      <span class="modal-result-title">📝 タップして入力するテキストを選択</span>
      <button class="modal-result-close" onclick="closeLens()">✕</button>
    </div>
    <div class="text-chips" id="textChips"></div>
    <button class="retake-btn" onclick="retake()">🔄 撮り直す</button>
  </div>
</div>

<script>
// ★ 設定 ★
const GAS_URL = "https://script.google.com/macros/s/AKfycbzVyfwZOJYs9PSTFdJgRh8tkgzFBoCfGQcncr46A8x4EZDoVwleybHDgw4OoJOKTxQd/exec";
const GEMINI_API_KEY = "AIzaSyD2so7TRyqTsNp3GrWRqfIbK8v5lv_2B5A";

let currentKey = "";
let html5QrCode = null;
let qrActive = false;
let lensStream = null;
let lensTargetCol = "";

// ── Lens Modal ──
async function openLens(col) {
  lensTargetCol = col;
  document.getElementById("lensModal").classList.add("open");
  document.getElementById("lensCamera").style.display = "block";
  document.getElementById("lensResult").classList.remove("show");
  document.getElementById("lensAnalyzing").classList.remove("show");

  try {
    lensStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } }
    });
    document.getElementById("lensVideo").srcObject = lensStream;
  } catch(e) {
    showStatus("error", "❌ カメラにアクセスできません", true);
    closeLens();
  }
}

function closeLens() {
  if (lensStream) { lensStream.getTracks().forEach(t => t.stop()); lensStream = null; }
  document.getElementById("lensModal").classList.remove("open");
}

function retake() {
  document.getElementById("lensResult").classList.remove("show");
  document.getElementById("lensCamera").style.display = "block";
}

async function captureFrame() {
  const video = document.getElementById("lensVideo");
  const canvas = document.getElementById("lensCanvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext("2d").drawImage(video, 0, 0);

  const dataUrl = canvas.toDataURL("image/jpeg", 0.9);
  const base64 = dataUrl.split(",")[1];

  document.getElementById("lensPreview").src = dataUrl;
  document.getElementById("lensAnalyzing").classList.add("show");
  document.getElementById("shutterBtn").disabled = true;

  try {
    const res = await fetch(
      "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=" + GEMINI_API_KEY,
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{
            parts: [
              { inline_data: { mime_type: "image/jpeg", data: base64 } },
              { text: "この画像に含まれるすべてのテキスト・数字・記号を読み取り、それぞれを改行区切りで出力してください。単語や番号など意味のある単位で区切ってください。説明不要。テキストのみ出力。" }
            ]
          }]
        })
      }
    );
    const json = await res.json();
    if (json.error) throw new Error(json.error.message);

    const rawText = json.candidates[0].content.parts[0].text.trim();
    const lines = rawText.split(/[\n,、。]+/).map(s => s.trim()).filter(s => s.length > 0);

    const chips = document.getElementById("textChips");
    chips.innerHTML = "";
    lines.forEach(text => {
      const chip = document.createElement("button");
      chip.className = "text-chip";
      chip.textContent = text;
      chip.onclick = () => selectText(text);
      chips.appendChild(chip);
    });

    document.getElementById("lensAnalyzing").classList.remove("show");
    document.getElementById("lensCamera").style.display = "none";
    document.getElementById("lensResult").classList.add("show");
  } catch(e) {
    document.getElementById("lensAnalyzing").classList.remove("show");
    showStatus("error", "❌ 認識エラー：" + e.message, true);
    closeLens();
  }
  document.getElementById("shutterBtn").disabled = false;
}

function selectText(text) {
  const field = document.getElementById("field" + lensTargetCol);
  field.value = text;
  const cam = document.getElementById("cam" + lensTargetCol);
  cam.classList.add("done");
  cam.textContent = "✅";
  setTimeout(() => { cam.classList.remove("done"); cam.textContent = "📷"; }, 3000);
  showStatus("ok", "✅ " + lensTargetCol + "列に入力しました：" + text, false);
  closeLens();
}

// ── Search input ──
function onInput() {
  document.getElementById("clearBtn").classList.toggle("show", document.getElementById("searchInput").value.length > 0);
}

function resetAll() {
  document.getElementById("searchInput").value = "";
  document.getElementById("clearBtn").classList.remove("show");
  document.getElementById("status").className = "status";
  document.getElementById("resultCard").style.display = "none";
  document.getElementById("searchBtn").disabled = false;
  document.getElementById("saveBtn").disabled = false;
  currentKey = "";
  stopQR();
  closeLens();
  document.getElementById("searchInput").focus();
}

function showStatus(type, msg, showReset) {
  document.getElementById("status").className = "status show " + type;
  document.getElementById("statusMsg").innerHTML = msg;
  document.getElementById("resetBtn").style.display = showReset ? "block" : "none";
}

// ── QR ──
async function toggleQR() {
  if (qrActive) { await stopQR(); return; }
  document.getElementById("qrWrap").classList.add("open");
  const btn = document.getElementById("qrBtn");
  btn.classList.add("scanning");
  btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h2v2h-2zM18 14h3M14 18h2M18 18h3v3M21 14v2"/></svg> スキャン中';
  qrActive = true;
  html5QrCode = new Html5Qrcode("qr-reader");
  try {
    await html5QrCode.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: { width: 220, height: 220 }, aspectRatio: 1.0 },
      (decodedText) => {
        document.getElementById("searchInput").value = decodedText.trim();
        document.getElementById("clearBtn").classList.add("show");
        stopQR();
        setTimeout(() => doSearch(), 300);
      },
      () => {}
    );
  } catch(e) {
    showStatus("error", "❌ カメラにアクセスできません", true);
    await stopQR();
  }
}

async function stopQR() {
  if (html5QrCode) { try { await html5QrCode.stop(); } catch(e) {} html5QrCode = null; }
  document.getElementById("qrWrap").classList.remove("open");
  const btn = document.getElementById("qrBtn");
  btn.classList.remove("scanning");
  btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h2v2h-2zM18 14h3M14 18h2M18 18h3v3M21 14v2"/></svg> QR読込';
  qrActive = false;
}

// ── Search & Save ──
async function doSearch() {
  const key = document.getElementById("searchInput").value.trim();
  if (!key) { showStatus("error", "❌ 検索キーワードを入力してください", false); return; }
  document.getElementById("searchBtn").disabled = true;
  document.getElementById("resultCard").style.display = "none";
  showStatus("loading", '<span class="spin">⟳</span>&nbsp; 検索中...');
  try {
    const res = await fetch(GAS_URL + "?key=" + encodeURIComponent(key));
    const json = await res.json();
    if (!json.success) {
      showStatus("error", "❌ \"" + key + "\" は見つかりませんでした", true);
      document.getElementById("searchBtn").disabled = false;
      return;
    }
    currentKey = key;
    document.getElementById("rowBadge").textContent = "ROW " + json.row;
    document.getElementById("resultKey").textContent = key;
    document.getElementById("fieldD").value = json.D ?? "";
    document.getElementById("fieldE").value = json.E ?? "";
    document.getElementById("fieldF").value = json.F ?? "";
    document.getElementById("fieldG").value = json.G ?? "";
    document.getElementById("resultCard").style.display = "block";
    showStatus("ok", "✅ " + json.row + "行目で見つかりました", false);
  } catch(e) {
    showStatus("error", "❌ " + e.message, true);
  }
  document.getElementById("searchBtn").disabled = false;
}

async function saveData() {
  if (!currentKey) { showStatus("error", "❌ まず検索してください", false); return; }
  document.getElementById("saveBtn").disabled = true;
  showStatus("loading", '<span class="spin">⟳</span>&nbsp; 保存中...');
  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({
        searchKey: currentKey,
        D: document.getElementById("fieldD").value,
        E: document.getElementById("fieldE").value,
        F: document.getElementById("fieldF").value,
        G: document.getElementById("fieldG").value,
      }),
    });
    const json = await res.json();
    if (json.success) showStatus("ok", "✅ " + json.row + "行目を保存しました", false);
    else showStatus("error", "❌ " + (json.error || "保存に失敗しました"), true);
  } catch(e) {
    showStatus("error", "❌ " + e.message, true);
  }
  document.getElementById("saveBtn").disabled = false;
}
</script>
</body>
</html>
